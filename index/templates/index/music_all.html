{% extends "base.html" %}
{% block page_title %} Tất cả bài nhạc mới {% endblock %}
{% block content %}

<h1 class="gold-gradient-text" style="font-size: 2.5rem; margin-bottom: 20px;">Tất cả bài nhạc mới</h1>
<hr style="border-color: rgba(255,255,255,0.1);" />

<div class="row">
  {% for music in musics %}
  <div class="col-md-2 col-sm-6 mb-4">
    <div class="song-card">
      <div class="song-img-container">
        {% if music.image %}
        <img src="{{ music.image.url }}" class="card-img-top" style="height: 200px; object-fit: cover" />
        {% endif %}

        <div class="song-overlay">
          <a href="#" class="overlay-icon"><i class="bi bi-heart"></i></a>
          <a href="{% url 'index:music_detail' music.id %}?next={{ request.path }}" class="overlay-icon play-main">
            <i class="bi bi-play-circle-fill"></i>
          </a>
          <a href="#" class="overlay-icon"><i class="bi bi-three-dots"></i></a>
        </div>
      </div>

      <div class="card-body">
        <a href="{% url 'index:music_detail' music.id %}?next={{ request.path }}" class="card-title-link">
          {{ music.title }}
        </a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>

<div style="margin-top: 50px; padding-bottom: 40px;">
  <a href="/" class="back-link-white">
    <i class="bi bi-arrow-left"></i> Quay lại trang chủ
  </a>
</div>

<style>
  .back-link-white {
    text-decoration: none !important;
    color: white !important;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    opacity: 0.8;
    transition: all 0.3s ease;
  }

  .back-link-white:hover {
    opacity: 1;
    transform: translateX(-5px);
    color: #fcf6ba !important;
  }

  .list-item-hover:hover span {
    color: #fcf6ba !important;
    transition: color 0.3s ease;
  }

  .list-item-hover:hover img {
    transform: scale(1.05);
    transition: transform 0.3s ease;
    filter: brightness(1.1);
  }
</style>

{% endblock %}
