{% extends "base.html" %}
{% block page_title %} Tất cả bài nhạc được nghe nhiều nhất {% endblock %}
{% block content %}

<h1 class="gold-gradient-text" style="font-size: 2.5rem; margin-bottom: 20px;">Danh sách Nhạc được nghe nhiều nhất</h1>
<hr style="border-color: rgba(255,255,255,0.1);" />

{% for hot in musics_hot %}
<div style="margin: 15px 0;">
  <a href="{% url 'index:musichot_detail' hot.id %}?next={{ request.path }}"
    style="text-decoration: none; display: flex; align-items: center; transition: all 0.3s;" class="list-item-hover">

    {% if hot.image %}
    <img src="{{ hot.image.url }}"
      style="width: 100px; height: 100px; object-fit: cover; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);" />
    {% endif %}

    <span
      style="margin-left: 20px; font-size: 1.5rem; font-weight: 700; color: white; font-family: 'Inter', sans-serif; transition: color 0.3s;">
      {{ hot.title }}
    </span>
  </a>
</div>
<hr style="border-color: rgba(255,255,255,0.05);" />
{% endfor %}

<div style="margin-top: 50px; padding-bottom: 40px;">
  <a href="/" class="back-link-white">
    <i class="bi bi-arrow-left"></i> Quay lại trang chủ
  </a>
</div>

<style>
  .back-link-white {
    text-decoration: none !important;
    color: white !important;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    opacity: 0.8;
    transition: all 0.3s ease;
  }

  .back-link-white:hover {
    opacity: 1;
    transform: translateX(-5px);
    color: #fcf6ba !important;
  }

  .list-item-hover:hover span {
    color: #fcf6ba !important;
  }

  .list-item-hover:hover img {
    transform: scale(1.05);
    transition: transform 0.3s ease;
  }
</style>

{% endblock %}
